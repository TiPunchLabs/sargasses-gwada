---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
        files: \.(yml|yaml)$
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        files: \.(yml|yaml)$

  # ESLint / Prettier run through the project's own pnpm toolchain so the
  # flat config and typescript-eslint plugins resolve correctly.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint --fix
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: true
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        files: \.(ts|tsx|js|jsx|css|json|md|html)$
        pass_filenames: true
